# Runs the indexer test suite on every push to main and on pull requests.
# The tests run entirely in-memory (simulated events) - no API token, RPC,
# or database is needed.

name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # The handler tests target the local anvil chain (31337); codegen, the type-check,
    # and the tests all read the config, so point envio at the local config rather than
    # the default config.yaml (Base Sepolia, which the hosted service deploys).
    env:
      ENVIO_CONFIG: config.local.yaml

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run codegen
        run: npm run codegen

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
