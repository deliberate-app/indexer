# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
# The default config: the Base Sepolia deployment, indexed by the Envio hosted service
# (HyperSync, no RPC needed). Being config.yaml, the hosted service picks it up by default.
# Local development uses config.local.yaml instead (see the justfile's dev recipes).
#
# The address is the deployed ArborVote (the interpolation lets ENVIO_ARBORVOTE_ADDRESS
# in the hosted service's environment-variables tab override it for a redeploy).
#
# The event list must stay in sync with config.local.yaml (the local anvil config).
name: arborvote-indexer-base-sepolia
chains:
  - id: 84532
    contracts:
      - name: ArborVote
        address:
          - "${ENVIO_ARBORVOTE_ADDRESS:-0xCA2449a3849B2a6dDc673613F24760ff366d6b09}"
        events:
          - event: ArgumentAdded(uint256 indexed debateId, uint16 indexed argumentId, uint16 indexed parentArgumentId, address creator, bool isSupporting, bytes32 contentURI, uint32 pro, uint32 con, uint48 finalizationTime)
          - event: ArgumentAltered(uint256 indexed debateId, uint16 indexed argumentId, bytes32 contentURI, uint48 finalizationTime)
          - event: ArgumentImpactCalculated(uint256 indexed debateId, uint16 indexed argumentId, int64 impact)
          - event: ArgumentMoved(uint256 indexed debateId, uint16 indexed argumentId, uint16 indexed newParentArgumentId, uint16 oldParentArgumentId, uint32 pro, uint32 con)
          - event: DebateCreated(uint256 indexed debateId, address indexed creator, bytes32 contentURI, uint48 timeUnit, uint48 editingEndTime, uint48 ratingEndTime)
          - event: DebateFinished(uint256 indexed debateId, bool approved)
          - event: FeesClaimed(uint256 indexed debateId, uint16 indexed argumentId, address indexed creator, uint32 fees)
          - event: Staked(uint256 indexed debateId, uint16 indexed argumentId, address indexed staker, (bool isPro, uint32 voteTokensStaked, uint32 fee, uint32 sharesOut) data)
          - event: Joined(uint256 indexed debateId, address indexed account, uint32 tokens)
          - event: SharesRedeemed(uint256 indexed debateId, uint16 indexed argumentId, address indexed account, uint32 proShares, uint32 conShares, uint32 payout)
