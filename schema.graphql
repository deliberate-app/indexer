"A debate: its thesis, phase clock, and aggregates. The thesis is the argument with `argumentId` 0."
type Debate {
  "The on-chain debate ID."
  id: ID!
  creator: String!
  "The sha-256 multihash digest of the thesis text (an IPFS raw-leaves block)."
  contentURI: String!
  lockingDuration: BigInt!
  editingEndTime: BigInt!
  ratingEndTime: BigInt!
  "The debate's market fee in percent, chosen by its creator at creation (0-99)."
  feePercentage: BigInt!
  "Whether the tally has run. Editing, Rating, and Tallying follow from the time gates; this latch is the only stored phase fact, so consumers derive the live phase from the gates and this flag."
  finished: Boolean!
  "Whether the debate approved the thesis. Only set once `finished` is true."
  approved: Boolean
  "Vote tokens committed to the debate's markets (deposits plus net stakes)."
  totalVotes: BigInt!
  argumentsCount: BigInt!
  "The number of joined accounts - the N in the bounty payout denominator."
  participantsCount: BigInt!
  "The chain time the tally ran. Only set once `finished` is true; bounty claims close CLAIM_WINDOW (7 days) after it."
  finishedAt: BigInt
  "The ERC-20 the bounty is denominated in. Unset when the debate carries no bounty."
  bountyToken: String
  "The total bounty funded (creation deposit plus top-ups), as received."
  bountyPool: BigInt!
  "The total bounty paid out to claimants so far."
  bountyClaimed: BigInt!
  "Whether the creator has swept the unclaimed remainder."
  bountySwept: Boolean!
  arguments: [Argument!]! @derivedFrom(field: "debate")
  participants: [Participant!]! @derivedFrom(field: "debate")
  bountyClaims: [BountyClaim!]! @derivedFrom(field: "debate")
}

"One participant's bounty claim (one-shot per participant and debate)."
type BountyClaim {
  "`{debateId}_{account}`"
  id: ID!
  debate: Debate!
  account: String!
  "The vote tokens the participant ended with beyond the initial grant."
  excess: BigInt!
  "The bounty amount paid out."
  amount: BigInt!
  timestamp: BigInt!
}

"One bounty funding - the creation deposit or a top-up (history, append-only)."
type BountyFunding {
  "`{chainId}_{blockNumber}_{logIndex}`"
  id: ID!
  debate: Debate!
  funder: String!
  "The amount received (after any transfer fee the token takes)."
  amount: BigInt!
  "The pool after this funding."
  pool: BigInt!
  timestamp: BigInt!
}

"A node of a debate's argument tree, carrying its market reserves."
type Argument {
  "`{debateId}_{argumentId}`"
  id: ID!
  debate: Debate!
  argumentId: BigInt!
  "The parent argument. Unset for the thesis."
  parent: Argument
  creator: String!
  "Whether the argument supports or opposes its parent. Unset for the thesis."
  isSupporting: Boolean
  "The sha-256 multihash digest of the argument text (an IPFS raw-leaves block)."
  contentURI: String!
  "The chain time from which the argument counts as final: locked in, tradeable, and tallied."
  finalizationTime: BigInt!
  "The market's pro reserve. The approval - the pro-share price - is con / (pro + con)."
  pro: BigInt!
  con: BigInt!
  "Vote tokens staked on this argument's market (deposit plus net stakes)."
  votes: BigInt!
  "Unclaimed market fees, claimable by the creator once the debate is finished."
  fees: BigInt!
  "The argument's weighted own rating, before its own pro/con stance is applied: its signed contribution to the parent's tally is `isSupporting ? impact : -impact`. Only set once the tally has run."
  impact: BigInt
  children: [Argument!]! @derivedFrom(field: "parent")
  stakes: [Stake!]! @derivedFrom(field: "argument")
}

"A debate participant and their vote-token balance, mirrored from the event stream."
type Participant {
  "`{debateId}_{account}`"
  id: ID!
  debate: Debate!
  account: String!
  tokens: BigInt!
  "The account's share holdings across the debate's arguments; the argumentIds feed `redeemArgumentSharesBatch`."
  positions: [Position!]! @derivedFrom(field: "participant")
}

"An account's current share holdings in one argument's market."
type Position {
  "`{debateId}_{argumentId}_{account}`"
  id: ID!
  argument: Argument!
  "The participant holding the shares, scoped to this debate."
  participant: Participant!
  account: String!
  proShares: BigInt!
  conShares: BigInt!
}

"One stake on an argument's market (history, append-only)."
type Stake {
  "`{chainId}_{blockNumber}_{logIndex}`"
  id: ID!
  argument: Argument!
  staker: String!
  isPro: Boolean!
  voteTokensStaked: BigInt!
  fee: BigInt!
  sharesOut: BigInt!
  timestamp: BigInt!
}

"One post-debate share redemption (history, append-only)."
type Redemption {
  "`{chainId}_{blockNumber}_{logIndex}`"
  id: ID!
  argument: Argument!
  account: String!
  proShares: BigInt!
  conShares: BigInt!
  payout: BigInt!
  timestamp: BigInt!
}
